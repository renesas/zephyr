description: Renesas RH850 Interrupt controller (INTC)
compatible: "renesas,rh850-intc"

include: [interrupt-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  "#interrupt-cells":
    const: 2

interrupt-cells:
  - irq
  - priority

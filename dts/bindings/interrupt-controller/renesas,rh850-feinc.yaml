description: Renesas RH850 FE level Interrupt controller (FEINC)
compatible: "renesas,rh850-feinc"

include: [interrupt-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  "#interrupt-cells":
    const: 1

  num-lines:
    type: int
    required: true
    description: Number of interrupt lines supported by the interrupt controller.

interrupt-cells:
  - irq

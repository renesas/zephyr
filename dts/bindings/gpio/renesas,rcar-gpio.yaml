description: Renesas RCAR GPIO

compatible: "renesas,rcar-gpio"

include: [gpio-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  channel:
    type: int
    description: The Port number of gpio, when use R-Car Gen5, this must be set

  "#gpio-cells":
    const: 2

gpio-cells:
  - pin
  - flags

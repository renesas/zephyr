description: Renesas RH850 CANFD controller

compatible: "renesas,rh850-canfd"

include: [can-fd-controller.yaml, pinctrl-device.yaml]

properties:
  interrupts:
    required: true

  channel:
    type: int
    required: true

  clock-frequency:
    type: int
    required: true

  rx-max-filters:
    type: int
    required: true
    description: |
      To determine the maximum rx filters can be added on this CAN device.
      Valid range: 1 - 128

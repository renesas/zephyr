description: Renesas RH850 DMA Controller

compatible: "renesas,rh850-dma"

include: dma-controller.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  dma-channels:
    required: true

  "#dma-cells":
    const: 2

  dma-unit:
    type: int
    required: true

dma-cells:
  - channel
  - config

description: Renesas RA Ethernet MAC Controller

compatible: "renesas,ra-eswm"

include: [base.yaml, pinctrl-device.yaml]

properties:
  interrupts:
    required: true

  clocks:
    required: true

  clock-names:
    required: true
    enum:
      - "gwcaclk"
      - "pclk"
      - "eswclk"
      - "eswphyclk"
      - "ethphyclk"
    description: |
      Clocks must be given corresponding names so that the shim driver can recognize them.
      "gwcaclk": operating clock for gateway CPU agent
      "pclk": peripheral clock for COMA and PTP timer
      "eswclk": operating clock for ethernet switch module
      "eswphyclk": operating clock for xMII interface
      "ethphyclk": operating clock for ETHPHYLCK pin output. Enable this clock if any PHY
      device use ETHPHYCLK pin output as clock source.

  port0-fwd:
    type: int
    required: false
    default: 0x4
    description: |
      Bitmask of destination ports for forwarding packets received on port 0.
      Values can be OR-combined:
        - 0x1: PORT0 (1 << 0)
        - 0x2: PORT1 (1 << 1)
        - 0x4: PORT2/CPU (1 << 2)
      Example: 0x7 forwards to all ports.

  port1-fwd:
    type: int
    required: false
    default: 0x4
    description: |
      Bitmask of destination ports for forwarding packets received on port 1.
      Values can be OR-combined:
        - 0x1: PORT0 (1 << 0)
        - 0x2: PORT1 (1 << 1)
        - 0x4: PORT2/CPU (1 << 2)
      Example: 0x7 forwards to all ports.

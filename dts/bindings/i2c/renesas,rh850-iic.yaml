description: Renesas RH850 I2C Controller

compatible: "renesas,rh850-iic"

include: [i2c-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  channel:
    required: true
    type: int

  interrupts:
    required: true

  rise-time-ns:
    type: int
    default: 120

  fall-time-ns:
    type: int
    default: 120

  duty-cycle-percent:
    type: int
    default: 50

  interrupt-priority-level:
    type: int
    default: 12

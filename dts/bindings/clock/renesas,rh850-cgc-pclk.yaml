description: |
  Renesas RH850 peripheral functional clock configuration.

compatible: "renesas,rh850-cgc-pclk"

include: [base.yaml, clock-controller.yaml]

properties:
  clk-source:
    type: int
    default: 1
    enum:
      - 0
      - 1
      - 2
      - 4
      - 5
    description: |
      Select the hardware clock source supplied to the peripheral clock.
      The numeric encoding is device-specific and must match the selected
      RH850 U2x hardware user's manual and FSP BSP clock configuration.

  div:
    type: int
    default: 0
    description: Raw hardware divider encoding for the peripheral clock.

  "#clock-cells":
    const: 0

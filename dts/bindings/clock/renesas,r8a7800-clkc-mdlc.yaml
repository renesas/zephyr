description: Renesas R8A7800 SoC Clock Controller(CLKC) / Module Controller(MDLC)

compatible: "renesas,r8a7800-clkc-mdlc"

include: [clock-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  "#clock-cells":
    const: 2

clock-cells:
  - domain
  - module

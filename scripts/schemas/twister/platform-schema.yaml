#
# Schema to validate a YAML file describing a Zephyr test platform
#
$schema: "https://json-schema.org/draft/2020-12/schema"
$defs:
  platform:
    type: object
    properties:
      variants:
        type: object
        patternProperties:
          "[a-zA-Z0-9_]+":
            $ref: "#/$defs/platform"
        additionalProperties: false
      identifier:
        type: string
      maintainers:
        type: array
        items:
          type: string
      name:
        type: string
      type:
        type: string
        enum: ["mcu", "qemu", "sim", "unit", "native"]
      simulation:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
              enum:
                [
                  "qemu",
                  "simics",
                  "xt-sim",
                  "renode",
                  "nsim",
                  "mdb-nsim",
                  "tsim",
                  "armfvp",
                  "native",
                  "custom",
                ]
            "exec":
              type: str
    "arch":
      type: str
      enum:
        [
          # architectures
          "arc",
          "arm",
          "arm64",
          "mips",
          "nios2",
          "posix",
          "rh850",
          "riscv",
          "rx",
          "sparc",
          "x86",
          "xtensa",

          # unit testing
          "unit",
        ]
    "vendor":
      type: str
    "tier":
      type: int
    "toolchain":
      type: seq
      seq:
        - type: str
    "sysbuild":
      type: bool
    "env":
      type: seq
      seq:
        - type: str
    "ram":
      type: int
    "flash":
      type: int
    "twister":
      type: bool
    "supported":
      type: seq
      seq:
        - type: str
    "testing":
      type: map
      mapping:
        "timeout_multiplier":
          type: number
          required: false
        "default":
          type: bool
        "binaries":
          type: seq
          seq:
            - type: str
        "only_tags":
          type: seq
          seq:
            - type: str
        "ignore_tags":
          type: seq
          seq:
            - type: str
        "renode":
          type: map
          mapping:
            "uart":
              type: str
            "resc":
              type: str

include: platform-schema

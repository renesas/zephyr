common:
  tags:
    - drivers
    - clock_control

tests:
  drivers.clock.clock_control_api_default:
    platform_allow:
      - esp32_devkitc/esp32/procpu
      - esp32c3_devkitc
      - esp32s2_devkitc
      - esp32s3_devkitc/esp32s3/procpu
      - sltb010a@0
      - xg24_dk2601b
      - xg27_dk2602a
      - xg29_rb4412a
      - bg29_rb4420a
      - sam_e54_xpro
      - pic32cm_jh01_cpro
    integration_platforms:
      - esp32_devkitc/esp32/procpu

  drivers.clock.clock_control_nrf5:
    platform_allow:
      - nrf51dk/nrf51822
      - nrf52dk/nrf52832
      - nrf52840dk/nrf52840
      - nrf9160dk/nrf9160
      - nrf5340dk/nrf5340/cpuapp
      - nrf5340dk/nrf5340/cpunet
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp/ns
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
      - nrf7120dk/nrf7120/cpuapp
      - nrf7120dk/nrf7120/cpuapp/ns
      - ophelia4ev/nrf54l15/cpuapp
    integration_platforms:
      - nrf51dk/nrf51822

  drivers.clock.clock_control_nrf5_lfclk_rc:
    platform_allow:
      - nrf51dk/nrf51822
      - nrf52dk/nrf52832
      - nrf52840dk/nrf52840
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp/ns
      - nrf5340dk/nrf5340/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
      - nrf7120dk/nrf7120/cpuapp
      - nrf7120dk/nrf7120/cpuapp/ns
      - ophelia4ev/nrf54l15/cpuapp
    integration_platforms:
      - nrf51dk/nrf51822
    extra_args: EXTRA_CONF_FILE="nrf_lfclk_rc.conf"

  drivers.clock.clock_control_rh850:
    platform_allow:
      # RH850 U2B10
      - pb_rh850u2b_292pin/r7f70254xafabb-c
      - pb_rh850u2b_468pin/r7f70254xafabg-c
      - pb_rh850u2b_468pin/r7f70254xfabg-c
      # RH850 U2C8
      - pb_rh850u2c_292pin/r7f702600afabb-c
      # RH850 U2A16
      - pb_rh850u2a_516pin/r7f702300bebbc-c
      - pb_rh850u2a_516pin/r7f702300ebbg-c
      - pb_rh850u2a_516pin/r7f702300aebbc-c
    extra_args:
      - CONFIG_CLOCK_CONTROL=y
      - CONFIG_CLOCK_CONTROL_RENESAS_RH850_CGC=y

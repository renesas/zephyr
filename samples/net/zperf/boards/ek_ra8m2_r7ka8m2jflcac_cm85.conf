CONFIG_USB_HOST_STACK=y
CONFIG_USBH_HUB_CLASS=y
CONFIG_USBH_SHELL=y

CONFIG_LOG=y
# CONFIG_UHC_DRIVER_LOG_LEVEL_WRN=n
# CONFIG_UHC_DRIVER_LOG_LEVEL_INF=n
# CONFIG_UHC_DRIVER_LOG_LEVEL_ERR=y
# CONFIG_UHC_DRIVER_LOG_LEVEL_DBG=y
CONFIG_UHC_XFER_COUNT=32
CONFIG_UHC_BUF_POOL_SIZE=8192

CONFIG_USBH_CDC_ECM_TX_PIPELINE_DEPTH=4
CONFIG_USBH_CDC_ECM_RX_PIPELINE_DEPTH=4

CONFIG_USBH_CDC_ECM_CLASS=y
# CONFIG_USBH_CDC_ECM_LOG_LEVEL_WRN=y
# CONFIG_USBH_CDC_ECM_LOG_LEVEL_ERR=y
# CONFIG_USBH_CDC_ECM_LOG_LEVEL_INF=y
CONFIG_USBH_CDC_ECM_LOG_LEVEL_DBG=y
# CONFIG_USBH_CDC_ECM_LOG_LEVEL_DEFAULT=y
# USBH
# CONFIG_USBH_LOG_LEVEL_INF=n
# CONFIG_USBH_LOG_LEVEL_ERR=y
# CONFIG_USBH_LOG_LEVEL_DBG=y

# Network - Ethernet L2
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_LOG=y
# CONFIG_NET_CORE_LOG_LEVEL_DBG=y
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_NET_TCP_WORKQ_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_NET_TCP_WORKER_PRIO=2
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=65535
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=65535
# Network - Core
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::2"
CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::1"
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.100.3"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.168.100.1"

# Shell (for basic commands)
CONFIG_SHELL=y
CONFIG_NET_SHELL=y

# Logging
CONFIG_LOG=y
CONFIG_USBH_CDC_ACM_CLASS=n
CONFIG_LOG_BUFFER_SIZE=3074
# Network Management Events
#CONFIG_NET_MGMT=y
#CONFIG_NET_MGMT_EVENT=y

CONFIG_DCACHE=y
